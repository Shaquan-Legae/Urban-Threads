<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Threads - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <nav>
        <div class="logo">Urban Threads</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
    <main>
        <div class="checkout-container">
            <h1>Checkout</h1>
            
            <div class="checkout-content">
                <!-- Order Summary -->
                <section class="checkout-section">
                    <h2>Order Summary</h2>
                    <div class="checkout-summary"></div>
                </section>

                <!-- Delivery Options -->
                <section class="checkout-section">
                    <h2>Delivery Options</h2>
                    <div class="delivery-options">
                        <label class="delivery-option">
                            <input type="radio" name="delivery" value="standard" data-fee="49.99">
                            <span class="delivery-label">Standard Delivery (5-7 days) - R49.99</span>
                        </label>
                        <label class="delivery-option">
                            <input type="radio" name="delivery" value="express" data-fee="99.99">
                            <span class="delivery-label">Express Delivery (2-3 days) - R99.99</span>
                        </label>
                        <label class="delivery-option">
                            <input type="radio" name="delivery" value="overnight" data-fee="199.99">
                            <span class="delivery-label">Overnight Delivery - R199.99</span>
                        </label>
                    </div>
                    <p class="delivery-error" style="display: none; color: #c62828; font-size: 0.9rem;"></p>
                </section>

                <!-- Payment Form -->
                <section class="checkout-section">
                    <h2>Payment Details</h2>
                    <form id="payment-form" class="payment-form">
                        <div class="form-group">
                            <label for="card-name">Cardholder Name</label>
                            <input type="text" id="card-name" placeholder="John Doe" maxlength="50">
                        </div>

                        <div class="form-group">
                            <label for="card-number">Card Number</label>
                            <div class="card-input-wrapper">
                                <input type="text" id="card-number" placeholder="4532 1234 5678 9010" maxlength="23" inputmode="numeric">
                                <span class="card-icon"></span>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="card-expiry">Expiry Date</label>
                                <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" inputmode="numeric">
                            </div>
                            <div class="form-group">
                                <label for="card-cvc">CVC</label>
                                <input type="text" id="card-cvc" placeholder="123" maxlength="4" inputmode="numeric">
                            </div>
                        </div>
                    </form>
                </section>

                <!-- Order Total with Delivery Fee -->
                <section class="checkout-section order-total-section">
                    <div class="order-total-row">
                        <span>Subtotal:</span>
                        <span id="subtotal-value">R0.00</span>
                    </div>
                    <div class="order-total-row">
                        <span>Delivery:</span>
                        <span id="delivery-value">-</span>
                    </div>
                    <div class="order-total-row total">
                        <span>Total:</span>
                        <span id="checkout-total">R0.00</span>
                    </div>
                </section>

                <!-- Pay Now Button -->
                <button id="pay-now-btn" class="pay-now-btn" type="button">Pay Now</button>

                <!-- Payment Success Message -->
                <div id="payment-success" class="payment-success" style="display: none;">
                    <div class="payment-success__icon">✓</div>
                    <p>Payment Processed Successfully</p>
                    <p class="success-subtitle">Your order has been placed.</p>
                    <a href="shop.html" class="success-link">Continue Shopping</a>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/checkout.js"></script>
    <script type="module" src="js/ui.js"></script>
</body>
</html>
