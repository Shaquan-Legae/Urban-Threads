<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Details</title>
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="payment-page">
        <div class="payment-container">
            <div class="payment-header">
                <h1 class="payment-title">Payment Details</h1>
                <p class="payment-subtitle">Secure checkout</p>
            </div>

            <form class="payment-form">
                <div class="form-group">
                    <label class="form-label">Cardholder Name</label>
                    <input type="text" class="form-input" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label class="form-label">Card Number</label>
                    <div class="card-input-wrapper">
                        <input type="text" class="form-input" placeholder="1234 5678 9012 3456" maxlength="19">
                        <div class="card-icons">
                            <i class="fab fa-cc-visa"></i>
                            <i class="fab fa-cc-mastercard"></i>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group form-group--half">
                        <label class="form-label">Expiry Date</label>
                        <input type="text" class="form-input" placeholder="MM/YY" maxlength="5">
                    </div>
                    <div class="form-group form-group--half">
                        <label class="form-label">CVV</label>
                        <input type="text" class="form-input" placeholder="123" maxlength="3">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Billing Address <span class="optional">(optional)</span></label>
                    <input type="text" class="form-input" placeholder="123 Main Street, City, Province">
                </div>

                <div class="payment-total">
                    <span class="total-label">Total Amount</span>
                    <span class="total-value">R 0.00</span>
                </div>

                <button type="submit" class="pay-btn">Pay Now</button>
            </form>

            <div class="security-badge">
                <i class="fas fa-lock"></i>
                <span>Your payment is secured with SSL encryption</span>
            </div>
            <div class="back">
                <a href="cart.html" class="back-link">← Back to Cart</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/card.js"></script>
</body>

</html>
